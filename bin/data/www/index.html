<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <title></title>
    <script>
      function updateTime() {
        document.getElementById('time').innerText = new Date().toString();
      }
    </script>
  </head>
  <body onload="updateTime();">
    <span id="time"></span>
    <br>
  </body>
</html>
